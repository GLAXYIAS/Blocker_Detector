<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Filter Checker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #fafafa; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        textarea { width: 100%; height: 120px; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: monospace; }
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        select, button { padding: 10px 16px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        button { background: #24292f; color: white; border: none; font-weight: 600; cursor: pointer; }
        button:hover { background: #000; }
        #resultsOutput { margin-top: 20px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; }
        .blocked { color: #cf222e; }
        .available { color: #1a7f37; }
    </style>
</head>
<body>

    <div class="card">
        <h1>URL Filter Auditor</h1>
        <p>Paste URLs below (separate with commas or new lines) to check if they are accessible on your current network filter.</p>
        
        <textarea id="urlInput" placeholder="example.com, schoolsite.org&#10;youtube.com"></textarea>
        
        <div class="controls">
            <select id="blockerSelect">
                <option value="goguardian">GoGuardian</option>
                <option value="linewize">Linewize</option>
                <option value="securly">Securly</option>
                <option value="generic">Generic/Other</option>
            </select>
            <button onclick="checkURLs()">Run Audit</button>
        </div>

        <div id="resultsOutput"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
